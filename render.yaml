# =====================================================================
# RAGINI - RENDER BLUEPRINT SPECIFICATION
# =====================================================================
# Use this YAML to deploy both the Next.js frontend and FastAPI backend 
# separately and automatically on Render with a single click.
#
# To deploy:
# 1. Connect your repository to Render.
# 2. Render will detect this `render.yaml` and offer to deploy the Blueprint.
# 3. Fill in the required API keys and connection strings in the dashboard.
# =====================================================================

services:
  # -------------------------------------------------------------------
  # 1. FastAPI Backend API Service
  # -------------------------------------------------------------------
  - type: web
    name: algonox-rag-backend
    env: python
    plan: free # Free tier is selected by default, upgrade to starter/pro if needed
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      
      # Core Database Credentials & AI Keys
      - key: MONGODB_URI
        sync: false # Must be set securely in Render dashboard
      - key: GROQ_API_KEY
        sync: false # Must be set securely in Render dashboard
      - key: REDIS_URL
        sync: false # Must be set securely in Render dashboard
      - key: REDIS_TOKEN
        sync: false # Must be set securely in Render dashboard
      - key: SCRAPER_API_KEY
        sync: false # Must be set securely in Render dashboard
      - key: TAVILY_API_KEY
        sync: false # Must be set securely in Render dashboard
      
      # Constants & Defaults
      - key: MODEL_NAME
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: RERANK_MODEL
        value: BAAI/bge-reranker-base
      - key: TEMPERATURE
        value: "0"
      - key: TOP_P
        value: "0.1"
      - key: LANGCHAIN_PROJECT
        value: RAGINI

      # SMTP Server Configuration (Optional)
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  # -------------------------------------------------------------------
  # 2. Next.js Frontend Web Service
  # -------------------------------------------------------------------
  - type: web
    name: algonox-rag-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      # Tell Next.js build process where to find the backend.
      # By default, Render names the backend service domain based on the name.
      # If your backend is named 'algonox-rag-backend', its URL is:
      # https://algonox-rag-backend.onrender.com
      # (If you change the backend service name on Render, update this value accordingly)
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://algonox-rag-backend.onrender.com
